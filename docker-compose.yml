version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wordquiz
      POSTGRES_USER: wordquiz
      POSTGRES_PASSWORD: wordquiz_secure
    ports:
      - "5432:5432"
    volumes:
      - wordquiz_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    # 1. Add this healthcheck so Docker knows when DB is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordquiz"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://wordquiz:wordquiz_secure@db:5432/wordquiz
    depends_on:
      db:
        # 2. Tell the API to wait for that healthcheck before starting
        condition: service_healthy
    restart: unless-stopped

volumes:
  wordquiz_pgdata: